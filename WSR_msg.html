<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WSR WhatsApp Sender</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  background: #25D366;
  color: white;
}

.container {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  flex-wrap: wrap;
}

.section {
  background: white;
  border-radius: 10px;
  padding: 10px;
  width: 30%;
  min-width: 280px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.section h2 {
  text-align: center;
}

/* ICONS */
.icon {
  cursor: pointer;
  font-size: 18px;
  margin-left: 6px;
}

/* ITEMS */
.item {
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* TEXTAREA */
textarea {
  width: 100%;
  margin-top: 8px;
  height: 70px;
}

.save-btn {
  margin-top: 5px;
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

.hidden {
  display: none;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  display: none;
}

/* ===================== */
/* GRADE COLORS */
/* ===================== */

/* GRADE 11 - PINK */
.g11 {
  background: #ffe4ec;
  color: #c2185b;
}

.g11 button {
  background: #f8bbd0;
  color: #880e4f;
}

.g11 .save-btn {
  background: #c2185b;
}

/* GRADE 10 - BLUE */
.g10 {
  background: #e3f2fd;
  color: #0d47a1;
}

.g10 button {
  background: #bbdefb;
  color: #0d47a1;
}

.g10 .save-btn {
  background: #1976d2;
}

/* GRADE 09 - PURPLE */
.g09 {
  background: #f3e5f5;
  color: #4a148c;
}

.g09 button {
  background: #e1bee7;
  color: #4a148c;
}

.g09 .save-btn {
  background: #7b1fa2;
}

button {
  border: none;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  width: 70%;
}
</style>
</head>

<body>

<div class="header">WSR WhatsApp Sender</div>

<div class="container">

<!-- ================= GRADE 11 ================= -->
<div class="section g11">
<h2>11</h2>

<!-- Sending -->
<div class="item">
<div class="row">
<button onclick="send('11','sending')">WSR Sending</button>
<span class="icon" onclick="edit('11','sending')">✏️</span>
<span class="icon" onclick="copyOnly('11','sending')">📋</span>
</div>
<div id="11-sending-box" class="hidden">
<textarea id="11-sending"></textarea>
<button class="save-btn" onclick="save('11','sending')">Save</button>
</div>
</div>

<!-- Reminder -->
<div class="item">
<div class="row">
<button onclick="send('11','reminder')">WSR Reminder</button>
<span class="icon" onclick="edit('11','reminder')">✏️</span>
<span class="icon" onclick="copyOnly('11','reminder')">📋</span>
</div>
<div id="11-reminder-box" class="hidden">
<textarea id="11-reminder"></textarea>
<button class="save-btn" onclick="save('11','reminder')">Save</button>
</div>
</div>

<!-- Warning -->
<div class="item">
<div class="row">
<button onclick="send('11','warning')">WSR Warning</button>
<span class="icon" onclick="edit('11','warning')">✏️</span>

</div>
<div id="11-warning-box" class="hidden">
<textarea id="11-warning"></textarea>
<button class="save-btn" onclick="save('11','warning')">Save</button>
</div>
</div>

<!-- Deadline -->
<div class="item">
<div class="row">
<button onclick="send('11','deadline')">WSR Deadline</button>
<span class="icon" onclick="edit('11','deadline')">✏️</span>
<span class="icon" onclick="copyOnly('11','deadline')">📋</span>
</div>
<div id="11-deadline-box" class="hidden">
<textarea id="11-deadline"></textarea>
<button class="save-btn" onclick="save('11','deadline')">Save</button>
</div>
</div>

</div>

<!-- ================= GRADE 10 ================= -->
<div class="section g10">
<h2>10</h2>

<div class="item">
<div class="row">
<button onclick="send('10','sending')">WSR Sending</button>
<span class="icon" onclick="edit('10','sending')">✏️</span>

</div>
<div id="10-sending-box" class="hidden">

<button class="save-btn" onclick="save('10','sending')">Save</button>

<div class="row">
<button onclick="send('10','reminder')">WSR Reminder</button>
<span class="icon" onclick="edit('10','reminder')">✏️</span>
<span class="icon" onclick="copyOnly('10','reminder')">📋</span>
</div>
<div id="10-reminder-box" class="hidden">
<textarea id="10-reminder"></textarea>
<button class="save-btn" onclick="save('10','reminder')">Save</button>

<div class="item">
<div class="row">
<button onclick="send('10','warning')">WSR Warning</button>
<span class="icon" onclick="edit('10','warning')">✏️</span>

</div>

<!-- ================= GRADE 09 ================= -->
<div class="section g09">
<h2>09</h2>

<div class="item">
<div class="row">
<button onclick="send('09','sending')">WSR Sending</button>
<span class="icon" onclick="edit('09','sending')">✏️</span>
<span class="icon" onclick="copyOnly('09','sending')">📋</span>
</div>
<div id="09-sending-box" class="hidden">
<textarea id="09-sending"></textarea>
<button class="save-btn" onclick="save('09','sending')">Save</button>

<div class="item">
<div class="row">
<button onclick="send('09','reminder')">WSR Reminder</button>
<span class="icon" onclick="edit('09','reminder')">✏️</span>
<span class="icon" onclick="copyOnly('09','reminder')">📋</span>
</div>
<div id="09-reminder-box" class="hidden">
<textarea id="09-reminder"></textarea>

<div class="item">

<button onclick="send('09','warning')">WSR Warning</button>
<span class="icon" onclick="edit('09','warning')">✏️</span>
<span class="icon" onclick="copyOnly('09','warning')">📋</span>

<div id="09-warning-box" class="hidden">
<textarea id="09-warning"></textarea>
<button class="save-btn" onclick="save('09','warning')">Save</button>

<div class="item">
<div class="row">
<button onclick="send('09','deadline')">WSR Deadline</button>
<span class="icon" onclick="edit('09','deadline')">✏️</span>
<span class="icon" onclick="copyOnly('09','deadline')">📋</span>
</div>
<div id="09-deadline-box" class="hidden">
<textarea id="09-deadline"></textarea>
<button class="save-btn" onclick="save('09','deadline')">Save</button>
</div>
</div>

</div>

</div>

<div class="toast" id="toast">Done</div>

<script>

// WhatsApp links
const links = {
  "11": "https://chat.whatsapp.com/FHjKaBunaM8HvJuE6RxfYi",
  "10": "https://chat.whatsapp.com/BZ4ZLi5ox1c8D5XuK5p2px",
  "09": "https://chat.whatsapp.com/BWUjhCnJDGz3cOaK5Uv63O"
};

// edit
function edit(g,type){
  document.getElementById(`${g}-${type}-box`).classList.toggle("hidden");
  document.getElementById(`${g}-${type}`).value =
    localStorage.getItem(`${g}-${type}`) || "";
}

// save
function save(g,type){
  let val = document.getElementById(`${g}-${type}`).value;
  localStorage.setItem(`${g}-${type}`, val);
  document.getElementById(`${g}-${type}-box`).classList.add("hidden");
}

// send
function send(g,type){
  let msg = localStorage.getItem(`${g}-${type}`) || "";

  copyText(msg);

  window.open(links[g], "_blank");

  showToast("Copied & Opening WhatsApp");
}

// copy only
function copyOnly(g,type){
  let msg = localStorage.getItem(`${g}-${type}`) || "";
  copyText(msg);
  showToast("Message Copied");
}

// clipboard helper
function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).catch(()=>fallback(text));
  } else {
    fallback(text);
  }
}

function fallback(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
}

// toast
function showToast(text){
  let t = document.getElementById("toast");
  t.innerText = text;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

// load saved
window.onload = function(){
  for(let g of ["11","10","09"]){
    for(let t of ["sending","reminder","warning","deadline"]){
      let v = localStorage.getItem(`${g}-${t}`);
      if(v){
        let el = document.getElementById(`${g}-${t}`);
        if(el) el.value = v;
      }
    }
  }
};

</script>

</body>
</html>
